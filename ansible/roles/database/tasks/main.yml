- name: Copy the files to server location
  copy: src=/home/utilizador/ansible/roles/database/files dest=/tmp mode=0777

- name: Apply postgres pv
  shell: kubectl apply -f /tmp/files/posgresql-pv.yml
  args:
    chdir: $HOME 

- name: Apply postgres deployment
  shell: kubectl apply -f /tmp/files/posgresql-deployment.yml
  args:
    chdir: $HOME 
