apiVersion: v1
kind: Service
metadata:
  name: wikijs
spec:
  type: NodePort
  selector:
    app: wikijs
  ports:
      # By default and for convenience, the `targetPort` is set to the same value as the `port` field.
    - port: 8000 #exported to cluster
      targetPort: 8000 #used to send requests to the pod
      # Optional field
      # By default and for convenience, the Kubernetes control plane will allocate a port from a range (default: 30000-32767)
      nodePort: 30007 #exported to the "outside"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wikijs
  labels:
    app: wikijs
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wikijs
  template:
    metadata:
      labels:
        app: wikijs
    spec:
      containers:
      - name: wikijs
        image: ascn21/wikijs
        env:
        - name: DB_HOST
          value: postgres
        - name: DB_DATABASE
          value: wikijs
        - name: DB_USERNAME
          value: wikijsuser
        - name: DB_PASSWORD
          value: "54321"
        ports:
        - containerPort: 8000
          name: wikijs
      # topologySpreadConstraints:
      # - maxSkew: 1
      #   topologyKey: kubernetes.io/hostname
      #   whenUnsatisfiable: DoNotSchedule
      #   labelSelector:
      #     matchLabels:
      #       app: swap